<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📒 월별 지출내역</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
<style>
:root {
  --bg: #fafaf7; --surface: #fff; --surface-2: #f1efe8;
  --text: #1a1a1a; --text-2: #5f5e5a; --text-3: #888780;
  --border: rgba(0,0,0,0.1); --border-2: rgba(0,0,0,0.2);
  --info-bg: #e6f1fb; --info-text: #0c447c;
  --success: #0f6e56; --warning-bg: #faeeda; --warning-text: #854f0b;
  --radius-md: 8px; --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "맑은 고딕", "Malgun Gothic", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a; --surface: #252525; --surface-2: #2e2e2e;
    --text: #f0f0f0; --text-2: #b8b8b8; --text-3: #888;
    --border: rgba(255,255,255,0.1); --border-2: rgba(255,255,255,0.2);
    --info-bg: #042c53; --info-text: #b5d4f4;
    --warning-bg: #412402; --warning-text: #fac775;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; padding: 20px; }
.container { max-width: 1100px; margin: 0 auto; }
header { margin-bottom: 1.5rem; }
header h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
header .sub { font-size: 13px; color: var(--text-2); }
header .source { font-size: 12px; color: var(--text-3); margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
header .source button { background: transparent; border: 0.5px solid var(--border-2); border-radius: var(--radius-md); padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--text-2); font-family: inherit; }
header .source button:hover { background: var(--surface-2); }

.loading, .error { padding: 3rem 1rem; text-align: center; }
.loading i, .error i { font-size: 36px; color: var(--text-3); margin-bottom: 12px; display: block; }
.error { background: var(--warning-bg); color: var(--warning-text); border-radius: var(--radius-lg); }
.error code { background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
.tab-btn { background: transparent; border: 0.5px solid var(--border-2); border-radius: var(--radius-md); padding: 8px 18px; font-size: 14px; font-weight: 500; color: var(--text-2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.tab-btn:hover { background: var(--surface-2); }
.tab-btn[aria-selected="true"] { background: var(--text); color: var(--bg); border-color: var(--text); }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.kpi-card { background: var(--surface-2); border-radius: var(--radius-md); padding: 1rem; }
.kpi-card.accent { background: var(--info-bg); }
.kpi-card.accent .kpi-label, .kpi-card.accent .kpi-value, .kpi-card.accent .kpi-meta { color: var(--info-text); }
.kpi-label { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
.kpi-value { font-size: 22px; font-weight: 500; }
.kpi-value.income { color: var(--success); }
.kpi-meta { font-size: 12px; color: var(--text-3); margin-top: 4px; }

.banner { background: var(--warning-bg); color: var(--warning-text); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; margin-bottom: 1.5rem; display: none; }
.banner.show { display: block; }

.chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
.chart-card h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-2); }
.legend span.item { display: flex; align-items: center; gap: 4px; }
.legend span.dot { width: 10px; height: 10px; border-radius: 2px; }
.chart-wrap { position: relative; width: 100%; }

.empty { text-align: center; padding: 4rem 1rem; background: var(--surface-2); border-radius: var(--radius-lg); margin-bottom: 1.5rem; }
.empty i { font-size: 48px; color: var(--text-3); opacity: 0.6; }
.empty .title { margin: 16px 0 4px; font-size: 16px; font-weight: 500; color: var(--text-2); }
.empty .desc { font-size: 13px; color: var(--text-3); }

footer { margin-top: 2rem; padding-top: 1rem; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text-3); text-align: center; }
footer a { color: var(--info-text); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

<header>
<h1>📒 월별 지출내역</h1>
<p class="sub" id="periodSub">데이터 로딩 중...</p>
<div class="source">
<span>📡 데이터 소스: 구글시트</span>
<a href="https://docs.google.com/spreadsheets/d/1XjFxNEDBO048QnY24RtztwxOFO0MzZ_ND3-AED7fJjY/edit" target="_blank" rel="noopener">시트 열기 ↗</a>
<button onclick="loadData()"><i class="ti ti-refresh"></i> 새로고침</button>
<span id="lastUpdate"></span>
</div>
</header>

<div id="loadingView" class="loading">
<i class="ti ti-loader"></i>
<p>구글시트에서 데이터를 불러오는 중...</p>
</div>

<div id="errorView" class="error" style="display: none;">
<i class="ti ti-alert-triangle"></i>
<p style="font-weight: 500; margin-bottom: 8px;" id="errorTitle">데이터를 불러올 수 없습니다</p>
<p style="font-size: 13px;" id="errorMsg"></p>
<p style="font-size: 12px; margin-top: 12px;">💡 시트 우상단 <code>파일 → 공유 → 웹에 게시 → CSV</code>로 게시하면 작동합니다.</p>
</div>

<div id="mainView" style="display: none;">

<div class="tabs" id="tabsContainer"></div>

<div id="dataView">
<div class="kpi-grid" id="kpiGrid"></div>
<div class="banner" id="pointBanner"></div>

<div class="chart-card">
<h3>결제수단별 지출</h3>
<div class="legend" id="methodLegend"></div>
<div class="chart-wrap" style="height: 220px;"><canvas id="methodChart"></canvas></div>
</div>

<div class="chart-card">
<h3>품목별 사용 비중</h3>
<div class="legend" id="catLegend"></div>
<div class="chart-wrap" style="height: 280px;"><canvas id="categoryChart"></canvas></div>
</div>

<div class="chart-card">
<h3>일별 지출 추이</h3>
<div class="chart-wrap" style="height: 240px;"><canvas id="dailyChart"></canvas></div>
</div>

<div class="chart-card">
<h3>상위 가맹점 (TOP 10)</h3>
<div class="chart-wrap" style="height: 400px;"><canvas id="merchantChart"></canvas></div>
</div>
</div>

<div id="emptyView" class="empty" style="display: none;">
<i class="ti ti-calendar-off"></i>
<p class="title" id="emptyTitle">선택한 월에 거래 데이터가 없습니다</p>
<p class="desc">SMS 문자전달 메일이 누적되면 자동으로 표시됩니다</p>
</div>

</div>

<footer>
<p>SMS 카드결제 메일 자동 집계 · <a href="https://docs.google.com/spreadsheets/d/1XjFxNEDBO048QnY24RtztwxOFO0MzZ_ND3-AED7fJjY/edit" target="_blank" rel="noopener">데이터 시트</a></p>
</footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
// ============================================================
// CONFIG: 구글시트 웹 게시 URL
// 시트 → 파일 → 공유 → 웹에 게시 → CSV 형식 → 게시 → 받은 URL
// ============================================================
const SHEET_ID = '1XjFxNEDBO048QnY24RtztwxOFO0MzZ_ND3-AED7fJjY';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSUbpeE9-Y1Wsbitg64trWFih6fvJrv9VC39e9qP9HCwDEwLh1Kr3An5-L2iOcbzfJGS1kgm0Eqaqs/pub?output=csv';

const PALETTE = ['#0c447c','#0f6e56','#3c3489','#993c1d','#854f0b','#3b6d11','#97c459','#378add','#5f5e5a','#1d9e75','#7f77dd','#d85a30','#bA7517','#639922'];
const METHOD_COLOR = {
  '현대카드 the Red': '#185fa5',
  '우리카드 신용(8701)': '#378add',
  '우리카드 체크(4777)': '#85b7eb',
  '우리은행 952852': '#993c1d',
};

const fmt = v => v.toLocaleString('ko-KR') + '원';
const fmtShort = v => {
  if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '만';
  if (Math.abs(v) >= 1000) return (v/1000).toFixed(0) + 'K';
  return Math.round(v).toString();
};

let allRows = [];
let currentMonth = null;
const charts = {};

async function loadData() {
  document.getElementById('loadingView').style.display = 'block';
  document.getElementById('errorView').style.display = 'none';
  document.getElementById('mainView').style.display = 'none';

  try {
    const res = await fetch(CSV_URL + '&_t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const csv = await res.text();
    const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true });

    allRows = parsed.data.map(r => ({
      date: r.date, time: r.time, month: r.month,
      kind: r.kind, group: r.group, method: r.method,
      merchant: r.merchant, amount: parseInt(r.amount, 10) || 0,
      category: r.category, isPoint: r.is_point === 'yes'
    })).filter(r => r.date && r.amount);

    if (allRows.length === 0) throw new Error('데이터 행이 비어있습니다');

    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('mainView').style.display = 'block';
    document.getElementById('lastUpdate').textContent = '· 갱신: ' + new Date().toLocaleString('ko-KR');

    renderTabs();
  } catch (e) {
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('errorView').style.display = 'block';
    document.getElementById('errorMsg').textContent = e.message + ' (' + CSV_URL + ')';
  }
}

function renderTabs() {
  const allMonths = [...new Set(allRows.map(r => r.month))].sort();
  if (allMonths.length === 0) return;

  const minMonth = allMonths[0];
  const maxMonth = allMonths[allMonths.length - 1];
  const today = new Date();
  const todayMonth = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const candidateMonths = new Set([...allMonths, todayMonth]);
  let cursor = minMonth;
  while (cursor <= maxMonth) {
    candidateMonths.add(cursor);
    const [y, m] = cursor.split('-').map(Number);
    const next = new Date(y, m, 1);
    cursor = `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}`;
  }
  const months = [...candidateMonths].sort();

  const container = document.getElementById('tabsContainer');
  container.innerHTML = months.map(m => {
    const [y, mm] = m.split('-');
    const label = `${parseInt(mm, 10)}월`;
    return `<button class="tab-btn" role="tab" data-month="${m}" onclick="switchMonth('${m}')">${label}</button>`;
  }).join('');

  const defaultMonth = allMonths.includes(todayMonth) ? todayMonth : allMonths[allMonths.length - 1];
  switchMonth(defaultMonth);
}

function switchMonth(month) {
  currentMonth = month;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.setAttribute('aria-selected', b.dataset.month === month ? 'true' : 'false');
  });

  const rows = allRows.filter(r => r.month === month);
  const [y, mm] = month.split('-');
  document.getElementById('periodSub').textContent = `${y}년 ${parseInt(mm, 10)}월`;

  if (rows.length === 0) {
    document.getElementById('dataView').style.display = 'none';
    document.getElementById('emptyView').style.display = 'block';
    document.getElementById('emptyTitle').textContent = `${parseInt(mm, 10)}월 거래 데이터가 아직 없습니다`;
    return;
  }

  document.getElementById('dataView').style.display = 'block';
  document.getElementById('emptyView').style.display = 'none';

  renderKPI(rows);
  renderMethodChart(rows);
  renderCategoryChart(rows);
  renderDailyChart(rows, month);
  renderMerchantChart(rows);
}

function renderKPI(rows) {
  const expenseRows = rows.filter(r => r.kind === 'expense' && !r.isPoint);
  const incomeRows = rows.filter(r => r.kind === 'income');
  const cardRows = expenseRows.filter(r => r.group === 'card');
  const cashOutRows = expenseRows.filter(r => r.group === 'cash_out');
  const pointRows = rows.filter(r => r.isPoint);

  const sum = arr => arr.reduce((s, r) => s + r.amount, 0);
  const income = sum(incomeRows);
  const card = sum(cardRows);
  const cashOut = sum(cashOutRows);
  const expense = sum(expenseRows);
  const net = expense - income;
  const point = sum(pointRows);

  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label"><i class="ti ti-arrow-down-left"></i> 들어온 돈</div>
      <div class="kpi-value income">+${fmt(income)}</div>
      <div class="kpi-meta">${incomeRows.length}건${incomeRows.length ? ' · ' + incomeRows.map(r=>r.merchant).slice(0,1).join('') : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ti ti-credit-card"></i> 카드 사용</div>
      <div class="kpi-value">${fmt(card)}</div>
      <div class="kpi-meta">${cardRows.length}건</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ti ti-cash"></i> 현금 출금</div>
      <div class="kpi-value">${fmt(cashOut)}</div>
      <div class="kpi-meta">${cashOutRows.length}건 · 우리은행</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ti ti-arrow-up-right"></i> 총 지출</div>
      <div class="kpi-value">${fmt(expense)}</div>
      <div class="kpi-meta">${expenseRows.length}건</div>
    </div>
    <div class="kpi-card accent">
      <div class="kpi-label"><i class="ti ti-target"></i> 순지출</div>
      <div class="kpi-value">${fmt(net)}</div>
      <div class="kpi-meta">지출-수입</div>
    </div>
  `;

  const banner = document.getElementById('pointBanner');
  if (point > 0) {
    banner.classList.add('show');
    banner.innerHTML = `<i class="ti ti-info-circle"></i> 포인트 사용 ${pointRows.length}건 ${fmt(point)} (${pointRows.map(r=>r.merchant).join(', ')}) — 현금 지출 아님, 합계에서 제외`;
  } else {
    banner.classList.remove('show');
  }
}

function makeLegend(elemId, items, total) {
  document.getElementById(elemId).innerHTML = items.map(([label, val, color]) => {
    const pct = total > 0 ? ' · ' + (val/total*100).toFixed(1) + '%' : '';
    return `<span class="item"><span class="dot" style="background:${color}"></span>${label}${pct}</span>`;
  }).join('');
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function renderMethodChart(rows) {
  const expenseRows = rows.filter(r => r.kind === 'expense' && !r.isPoint);
  const byMethod = {};
  expenseRows.forEach(r => byMethod[r.method] = (byMethod[r.method] || 0) + r.amount);
  const sorted = Object.entries(byMethod).sort((a,b) => b[1] - a[1]);
  const items = sorted.map(([m, v]) => [m, v, METHOD_COLOR[m] || '#5f5e5a']);
  const total = sorted.reduce((s, [,v]) => s+v, 0);

  destroyChart('methodChart');
  charts.methodChart = new Chart(document.getElementById('methodChart'), {
    type: 'bar',
    data: { labels: items.map(i=>i[0]), datasets: [{ data: items.map(i=>i[1]), backgroundColor: items.map(i=>i[2]), borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.parsed.x) } } },
      scales: {
        x: { ticks: { callback: fmtShort, font: { size: 11 } }, grid: { color: 'rgba(125,125,125,0.1)' } },
        y: { ticks: { font: { size: 12 } }, grid: { display: false } }
      }
    }
  });
  makeLegend('methodLegend', items, total);
}

function renderCategoryChart(rows) {
  const expenseRows = rows.filter(r => r.kind === 'expense' && !r.isPoint);
  const byCat = {};
  expenseRows.forEach(r => byCat[r.category] = (byCat[r.category] || 0) + r.amount);
  const sorted = Object.entries(byCat).sort((a,b) => b[1] - a[1]);
  const items = sorted.map(([c, v], i) => [c, v, PALETTE[i % PALETTE.length]]);
  const total = sorted.reduce((s, [,v]) => s+v, 0);

  const chartWrap = document.getElementById('categoryChart').parentElement;
  chartWrap.style.height = Math.max(items.length * 36 + 60, 220) + 'px';

  destroyChart('categoryChart');
  charts.categoryChart = new Chart(document.getElementById('categoryChart'), {
    type: 'bar',
    data: { labels: items.map(i=>i[0]), datasets: [{ data: items.map(i=>i[1]), backgroundColor: items.map(i=>i[2]), borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => `${fmt(c.parsed.x)} (${(c.parsed.x/total*100).toFixed(1)}%)` } }
      },
      scales: {
        x: { ticks: { callback: fmtShort, font: { size: 11 } }, grid: { color: 'rgba(125,125,125,0.1)' } },
        y: { ticks: { font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
  makeLegend('catLegend', items, total);
}

function renderDailyChart(rows, month) {
  const expenseRows = rows.filter(r => r.kind === 'expense' && !r.isPoint);
  const byDay = {};
  expenseRows.forEach(r => byDay[r.date] = (byDay[r.date] || 0) + r.amount);

  const dates = Object.keys(byDay).sort();
  if (dates.length === 0) return;

  const minDate = new Date(dates[0]);
  const maxDate = new Date(dates[dates.length - 1]);
  const labels = [], data = [];
  for (let d = new Date(minDate); d <= maxDate; d.setDate(d.getDate() + 1)) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    labels.push(`${d.getMonth()+1}/${d.getDate()}`);
    data.push(byDay[key] || 0);
  }

  destroyChart('dailyChart');
  charts.dailyChart = new Chart(document.getElementById('dailyChart'), {
    type: 'line',
    data: { labels, datasets: [{ data, borderColor: '#185fa5', backgroundColor: 'rgba(24,95,165,0.12)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#185fa5', pointHoverRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.parsed.y) } } },
      scales: {
        y: { beginAtZero: true, ticks: { callback: fmtShort, font: { size: 11 } }, grid: { color: 'rgba(125,125,125,0.1)' } },
        x: { ticks: { font: { size: 11 }, autoSkip: false, maxRotation: 0 }, grid: { display: false } }
      }
    }
  });
}

function renderMerchantChart(rows) {
  const expenseRows = rows.filter(r => r.kind === 'expense' && !r.isPoint);
  const byMerchant = {};
  expenseRows.forEach(r => {
    let key = r.merchant;
    if (key.includes('쿠팡') || key.includes('쿠팡페이')) key = '쿠팡 (통합)';
    else if (key.includes('GS25') || key.includes('씨유') || key.includes('세븐일레븐') || key.includes('이마트24')) key = '편의점 (통합)';
    else if (key.includes('카카오페이')) key = '카카오페이 (충전)';
    else if (key.includes('토뱅')) key = '토스뱅크 이체';
    byMerchant[key] = (byMerchant[key] || 0) + r.amount;
  });
  const sorted = Object.entries(byMerchant).sort((a,b) => b[1] - a[1]).slice(0, 10);
  const colors = sorted.map((_, i) => PALETTE[i % PALETTE.length]);

  destroyChart('merchantChart');
  charts.merchantChart = new Chart(document.getElementById('merchantChart'), {
    type: 'bar',
    data: { labels: sorted.map(s=>s[0]), datasets: [{ data: sorted.map(s=>s[1]), backgroundColor: colors, borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.parsed.x) } } },
      scales: {
        x: { ticks: { callback: fmtShort, font: { size: 11 } }, grid: { color: 'rgba(125,125,125,0.1)' } },
        y: { ticks: { font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
